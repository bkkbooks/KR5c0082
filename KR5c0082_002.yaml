front:
  text: 道德真經次解卷下𠕏八
  hash: sha256:8349cd90128ff1a484b7b756042a32f8ee0e5300bf6a5d407e3b3d022f6a698f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0082_HFL_002-001a, image: hfl/0386/0386-138.png}
body:
  text: 德經述夫道者萬物之始也無形德者萬物之用也有象德生於道道成於德至德至道一也得之者生失之者死聖人居道德之先故無生無死世人在道德之後故有死有生得之者無取失之者莫尋在無德無取之中謂之得道於有作有用之際謂之得德矧乎其有全不知道德浮泛生死流浪性命者不可勝紀故老子說道經焉德經焉上德不德是以用也有德下德不失德是以無德上德之人不恃其德故有其德下德之人常執其德故無其德上德無為而無以為下德為之而有以為上德無為無事可為下德有為有所作為上仁為之而無以為上義為之而有以為上仁合德亦無可為上義制斷以有可為上禮為之而莫之應則攘臂而仍之上禮有求故無以應之攘臂者時謂展手取物也禮為執行五常也故失道而後德失德而後仁失仁而後義失義而後禮夫禮者忠信之薄而亂之首失自然而後有德業失德業有仁行失仁行有義路失義路有禮儀存禮儀則薄於忠信而失自然為紊亂之首也前識者道之華而愚之始世之愚人只見其前不顧其後只慕其始不保其終譬之果木但愛其華葉不取其結實也是以大丈夫處其厚不處其薄居其實不居其華處其重厚不居浮薄取其結實不愛華葉故去彼取此去彼之華取此之實昔之得一者天得一一謂正道以清清靜也地得一以寧安寧也神得一以靈通靈也谷得一以盈盈滿也萬物得一以生生長也王侯得一以為天下政政化也其致之謂棄一也天無以清將恐裂毁裂也地無以寧將恐發發泄也神無以靈將恐歇虛歇也谷無以盈將恐竭空竭也萬物無以生將恐滅滅絶也王侯無以貴高將恐蹶顚蹶也故貴以賤為本高以下為基貴因賤顯貴高因下顯高是以侯王自謂孤寡不轂車轂也謂衆輻所凑此其以賤為本耶非故致數譽無譽孤單寡少也王侯德及天下故數其美譽非欲受其美譽也不欲琭琭如玉落落如石玉少而貴石多而賤有德者不求貴而求賤也反者道之動弱者道之用下之物生於有有生於無動靜合道柔弱用道萬物因有而生却歸於無也上士聞道勤能行之中士聞道若存若亡下士聞道大笑之不笑不足以為道上士禀清氣而生聞道勤行中士禀和氣而生聞道如存若亡下士禀濁氣而生全不知道道與俗反故有可笑建言有之初立言時明道若昧道明之後常如暗昧進道若退遁跡隱名為進其道夷平也道若類大道平正有如類物上德若俗德雖居上不離凡俗大白若辱潔白之人常如受辱廣德若不足德廣無邊故常不足建德若偷立德之人如偷盜物畏人知也質真若渝真正之人常似渝濫大方無隅四方闊遠難定疆隅大器晚成造大器物者不可以卒成大音希聲至大者莫若於雷不可以長吼大象無形大象天地也無有定形道隱無名道不可以名字呼也夫唯道善貸且成唯道貸與人精氣使各遂其生成也道生一一生二二生三三生萬物萬物負陰而抱陽冲氣以為和人之所惡唯孤寡不轂而王公以為名故物或損之而益益之而損道生一氣一氣生二儀二儀生三才三才生萬物萬物負荷其陰常抱其陽用冲氣和上下取孤寡比王公損益之道人之常也人之所教亦我義教之强梁者不得其死吾將以為教父以强梁者為鑒戒欲使人常守柔弱之道矣天下之至柔馳騁天下之至堅柔弱勝剛强也無有入無間是以知無為之有益不言之教無為之益天下希及之無間是無間隔之處將無為之道入得無間也不言之教無為之益天下少有人得之希猶少也名與身孰親身與貨孰多得與亡孰病是故甚愛必大費多藏必厚亡故知足不辱知止不殆可以長久名疏身親不可損身而逐名身少貨多不可喪身而求貨得有得病失有失病有愛有費有藏有亡欲要長久知足守分不見危殆矣大成若缺其用不弊故也大滿若冲其用不窮匱也大直若屈大巧若拙大辨若訥躁勝寒靜勝熱清靜能為天下政道德成滿之後以虧缺冲和為稱則其用無故弊窮匱所以直似屈巧如拙辨由訥躁熱皆煩撓之名寒靜則無事之境為正理之本也天下有道却去也走馬亦戎馬也以糞事田園也天下無道戎馬甲兵也生於郊國君有道不事走馬而事田園無道則戎馬遍於郊野言好甲兵也事田園勸農也事甲兵害物也罪莫大於可欲禍莫大於不知足咎莫甚於欲得故知足之足常足可欲之罪求遂志也殃咎及身若不知足是好貪欲也故知足凡事皆足矣不出户知天下不窺牖見天道其出彌遠其知彌少是以聖人不行而知不見而名不為而成天下之道一也户內與天下無二也但修其內自知其外天道與人道合但修其身天道必應何假遠行窺牖也故聖人不以出門求不以見聞取不以言論得自然而成也為學日益為道日損損之又損之以至於無為無為無所不為取天下常以無事及其有事不足以取天下為博學日有所益為道德日有所損謂損情欲也使至於無為無事之際則天下之心無難取矣聖人無常心以百姓心為心百姓有欲聖人無為以無為之心從有欲之心隨其性矣善者吾善之不善者吾亦善之得善信者吾信之不信者吾亦信之得信善者善解祇對不善者亦善解祇對為得其善道信者信之不信者亦信之為得其信理也聖人在天下惵惵為天下渾其心百姓皆注其耳目聖人皆㤥之聖人惵惵孜孜與百姓混同其心百姓注目望恩聖人皆㤥恤之出生入死修道則出生耽欲則入死生之徒十有三死之徒十有三人之生動之死地十有三夫何故以其生生之厚人之在世生死是常縱死十分之中三分有其生路縱生十分之中三分是其死路為其求生之厚不免有死有生故動則犯其死地蓋聞善攝養也生者陸行不遇兕虎入軍不被甲兵害人者兕有角虎有爪兵有刃兕無所駐其角虎無所錯其爪兵無所容其刃夫何故以其無死地陸行知晨夕入軍識進退能養生善避害故無死地道生之德畜之物形之勢成之是以萬物莫不尊道而貴德萬物賴道生德畜形立身成故尊道而貴德道尊德貴夫莫之爵而常自然道德自然非因爵賞而稱尊貴故道生之德畜之長之育之成之熟之養之覆之生而不有為而不恃長而不宰是謂玄德謂道能生畜長育成熟覆養之後不宰其生為之玄妙也天下有始道也以為天下母既得其母以知其子萬物也既知其子復守其母却守其道沒身不殆萬物從道而生故為其母母須知其子子須知其母子母守為不失其道故身無危殆塞其兊目也閉其門口也終身不勤開其門濟其事終身不救守道者口不貴言論目不觀好惡違之者事無窮救身受勤勞見小曰明明見其微守柔曰强用其光道也復歸其明無遺身殃是謂襲常凡事從小至大守柔自强動用歸道莫失其常故無身殃使我介善也然有知行於大道唯施是畏使我善知有其大道所畏者施行不得俗為知道易行道難也大道甚夷其人好徑大道如平路人不好行盡往邪徑朝甚除日有除改為改易衣服器皿好玩僕馬宅舍之屬田甚苗倉甚虛田疇雖有苗稼其那倉庫空虛言費用多服文綵衣美服飾謂綾羅綿繡也帶利劍好弓劍也厭飲食烹宰不暇資貨有餘積聚寶貨多金玉也是謂盜跨非道也哉如此所好與盜賊無殊跨是者非道德也善建立也不拔善建立事者不可抽拔善抱不脫善抱道者不可脫落子孫祭祀不輟有道德者子子孫孫世世不絶祭祀修之於身其德能真正真無邪修之於家其德有餘德業有餘修之於鄉其德能長為事長遠修之於國其德能豐萬物豐饒修之於天下其德能普德澤普遍故以身觀身修身則吉不修則凶以家觀家修家則理不修則亂以鄉觀鄉修鄉則和不修則爭以國觀國修國則政不修則亡以天下觀天下修天下則混同不修則潰散吾何以知天下之然以此聖人用此道可以觀天下舍德之厚比於赤子毒蟲不螫傷也攫鳥猛獸不搏厚舍容道德之者常如赤子無心於物故鳥獸見之不為傷害搏猶害也骨弱筋柔而握固赤子柔弱雖柔弱而能熟持堅固為元氣在也未知玄牝之合而䘒精氣結實作精之至終日號而不嗄聲散為嗄和之至玄牝夫婦之道也其未知之則正精常存號而不散言和氣至也知和曰常益生曰詳審度精氣心使氣曰强不使則住物壯則老謂之非道非道早已能知和氣常存用心審度使資益於身為强明又長守柔弱壯則非道也知者不言言者不知塞其兊閉其門挫其鋭解其忿和其光同其塵是謂玄同故不可得親不可得疏不可得利不可得害不可得貴不可得賤故為天下貴知道者不言為守道也不知道者常以言語欲行其道也知道者塞兊閉門挫鋭解忿和光同塵所以無有親疏利害貴賤與道同於玄德故得天下貴之不知道者反此以政之國以奇用兵以無事取天下吾何以知天下之然以此政可以治國奇可以用兵用兵將奇謀異策驅之死地不可示以哀誠治國欲安治民莫示以奇詐先除己之患難然後可以拓土開疆聖人知此二者為政治之然也天下多忌諱而人彌貧忌多叛亂故立其制諱不從所欲故行其刑人多利器國家滋昏人以利害為器用是國家政治之昏亂人多知巧奇物滋起人足奇巧多異物以惑衆法令滋彰盜賊多有賊盜數起畏法令而為之故聖人云我無為而人自化不肅而成我無事而人自富各從所欲我好靜而人自政不設法以臨人我無欲而人自朴不立名教無人委知其政悶悶其人蠢蠢其政察察其人缺缺為政悶悶其人蠢靜為政孜切其人殘缺禍福之所倚恃也福禍之所伏藏也孰誰也知其極人倚有禍修福助之不知福生却有禍至其無政失其治也政為奇善復為訞人之迷其日固久是以聖人方而不割廉而不穢直而不肆光而不耀失其政治政事翻作奇詐善事復為訞亂人迷惑久固於斯聖人方圓而不割廉慎而不穢濁正直而不申肆韜光而不皛耀也治人事天莫若式法也夫唯式是以早伏早伏謂之重積德重積德則無不充無不充莫知其極能知其極可以有國有國之母母猶道也可以久長深根固蒂深植其根蒂無標落長生久視之道治人情事天時莫若守法式故得萬物早歸伏歸伏之後為重積德積德充滿莫知物之窮極能知窮極可以治國然後為母深根固蒂為善保國家可大可久也治大國若烹小腥小腥雜類以道蒞臨也天下其鬼不神非其鬼不神其神不傷人非其神不傷人聖人亦不傷人夫兩不相傷故德交歸聖人在上禽魚遂性而况於國乎以道蒞天下者時氣雍和淫厲不作故鬼不能為神也萬物皆有其神為神則傷人唯正神不傷人聖人體道亦不傷人故交歸於德大國者下流天下之郊天下之郊牝牝雌也為柔常以靜雌守靜也勝牡牡雄也為剛大國如川源下流衆物皆歸天下混一四方為郊常以柔勝剛也故大國以下小國則取小國小國以下大國則聚大國故或下而取或下而聚夫大國不過欲兼畜人小國不過欲入事人夫兩者各得其所欲大欲畜小欲事故大者宜為下大國以禮小國小國以禮大國大國欲畜人小國入事人雖兩有所求大者宜下取道者萬物之奧善人之寶不善人之所不保深奧者莫過於道善人所為珍寶不善人不解所保持美言可以市尊行可以加人善能取與人之不善奚棄之有故立天子置三公天子治三公三公治百職百職治萬民故無棄人雖有拱璧以四馬駿馬不如坐進此道道與四馬拱璧皆能行唯修道者身不往古之所以貴此道者何不曰求以得有罪以免故為天下貴古者云不須日行大道濟利一切但無罪𠎝便為貴也為無為無作用也事無事不勞役也味無味守淡泊也大小多少報怨以德大之與小多之與少盡以德服之必無怨惡也圖難於易為大於細微也天下難事必作於易大事必作於小凡事先易後難從小至大則難事易為大事易作夫輕諾必寡信先輕唯諾後必無應多易必多難容易施為終難成立是以聖人猶難之故終無難歷試諸難後成功德其安易持安靜則易保持其未兆易謀未有形兆則易謀度其毳易破當織毳時則易破除其微易散物微小則易為分散為之於未有治之於未亂治亂於未亂之前為事於未成之際豫備不虞合抱之木生於毫末九重之臺起於纍土百仞之高起於足下從微至著以小成大為者敗之執者失之是以聖人無為故無敗無執故無失人之從事常於幾微也成而敗之慎終如始則無敗事世人執著有欲動則乖違聖人常事無為不見衰盛世人又不能敬始慎終才擬施為早已敗失是以聖人欲不欲不貴難得之貨學不學備衆人之所過以輔萬物之自然而不敢為欲於不欲學於不學不重貨財不貪名位如此則備見衆人之過乃輔成萬物以至於自然此聖人之㫖也古之善為道者非以明人將以娛之悅樂也人之難治以其知故謂有分别以智治國國之賊害也不以智治國國之德富有其事知此兩者以智不以智也亦為楷式定法也常知楷式是謂玄德治本玄德深遠與物反然後乃至大順古之為治者非要人明好惡有分别只欲使其娛樂無識無知如有所知故為難治智慧生姦詐深為賊害之端玄德用楷式時情盡遣歸於大順江海所以能為百谷王者以其善下之故能為百谷王江海下流百谷歸之是以聖人欲上人以其言下之謂存恤也欲先人以其身後之行濟度也是以處上其人不重責也處前而人不害損也是以天下樂推而不厭以其無爭故天下莫能與之爭聖人在位有接下奉上之心處前有先人後己之德衆無厭倦常日樂推誰能與爭天下皆以我大不笑夫唯大故似不笑若笑久其小天下以道至大故不可笑校謂其大故不笑校若人笑校得久有也其小矣我有三寶寶而持之一曰慈一曰儉三曰不敢為天下先以慈儉不先為三寶聖人如珍寶執持夫慈故能勇慈為救物故勇儉故能廣儉能節用故廣不敢為天下先故能成器長不為先能謙讓故得為長今捨其慈且勇捨其儉且廣捨其後且先死矣今勇而不慈廣而不儉先而不後為取死之道也夫慈以陳軍陳也則正以守狩音則固守城邑也天將救之以慈衛之陳以慈則不殺守以慈則不害應天順人自有救衛古之善為士者不武存治道也善戰者不怒不尚煞也善勝敵者不爭能陳無戰善用人者為下兩軍相交禮在其間是謂不爭之德是謂用人之力是謂配天古之極武以定難善治國者無難故不尚武也若事不獲己而用兵戈不怒其寇不與敵爭以禮下人務取其勝將德配天是古之極法也用兵有言古人有言吾不敢求為主為禍之首而為客言不獲己不敢進寸而退尺無侵吞之意也是謂行無行有令無行攘無臂有收無取執無兵有兵無用仍無敵以法行軍何敵之有禍莫大於侮敵懷輕敵也侮敵則幾亡吾寶自己兵也故抗拒也兵相加若哀者勝善戰雖無敵可當若輕敵必喪自己夫兩兵相加柔者勝强吾言甚易知甚易行無私也無難也天下莫能知莫能行深奧也言有宗事有君出言依宗祖為事存君臣夫唯無知是以莫我知世有所不知聖人亦不能知之知我者希則我者貴知道者希則道者貴是以聖人被褐懷玉弊衣為被褐抱道為懷玉知不知上得其道也不知知病强去知解聖人不病無所思慮以其病病是以不病病於所知故得無病人不畏威則大威至出入慎慮必無大過無狹其所居無容愁悴常存止取無厭其所生生期有限何可逼迫夫唯不厭是以不厭乃可長生故聖人自知不自見自愛不自貴不求見聞自知也不愛榮華自貴也去彼取此去彼亡生取此得道勇於敢則殺汏去便往勇於不敢則活審度事宜此兩者或利或害天之所惡孰知其故人不知夭道貴無欲惡利害天之道不爭而善勝不言而善應不召而自來不言而善謀天網恢恢疏而不失天道常健所以自勝自應自來自謀萬物雖衆以道網羅擬往何之故無疏失人常不畏死奈何以死懼之人世少有全身遠害者多恣貪叨不畏刑法是不懼死也若使人常不畏死而為奇者吾試得而殺之若人不畏死世有奇者焉得取次而殺之孰敢誰敢殺識死之人也有司殺者殺主刑憲者夫代司殺者是代大匠斫秉法之人斫權也夫代大匠斫希不傷其手雖大匠少有傷其手或失之輕或失之重人之飢以其上食稅之多是以飢賦斂重也人之難治以其上有為是以難治酷法臨人人之輕死以其生生之厚是以輕死重滋味積珠金夫唯無以生為者是賢於貴生求生之厚者死求生之薄者生人之生柔弱其死堅强神魂在則柔弱其散也堅强萬物草木之生也柔毳微生曰毳其死也枯槁氣存則柔弱其絶也枯槁故堅强者死之徒柔弱者生之徒是以兵强則不勝木强則拱兵務和衆木要中材故强大居下柔弱處上枝梢處上根株在下兵士在前主軍在後天之道其由張弓高者抑之下者舉之有餘者損之不足者與之天之道損有餘補不足人道則不然損不足奉有餘天貴和順弓尚調均大小無偏高下有等以此治世謂之太平人道不然奉强遏弱將少就多謂就權要孰能有餘奉天下唯有道者分上所有將濟不足是以聖人為而不恃成功不處斯不貴賢聖人推功讓祿德及賢良天下柔弱莫過於水而攻堅强莫之能先其無以易之水能淬鐵不可易也故柔勝剛弱勝强天下莫能知莫能行陰能消陽柔能勝强夭下少有知者少有行者受國之垢是謂社稷主受國不祥是謂天下王正言若反國之艱難諸侯當之天下多難唯王治之是謂為政之道和大怨必有餘怨安可以為善先有怨惡後能平治未足為善是以聖人執左契符契也不責於人故有德司契無德司轍有德者凡事與人符契不責於人無德者常欲使人合轍故有怨讎轍猶跡也夭道無親常與去聲善人天道無有親疏常與善人合德小國寡人有什伯之器才智之人而不用不任用也使人重死而不徙小國無用大道治國之臣而任有才智之士使嚴立法制禁戢人民使人冒死而遠適他國聖人欲行大道不用才智使人重死而不去也徙猶移也雖有舟輿無所乘之不勞運動有甲兵無所陳之無有戰爭使人復結繩而用之却倰還淳甘其食美其服不飢不寒安其居樂其俗家給人足無有徭役鄰國相望四境不侵雞狗之聲相聞鄰里相近使人至老死不相往來使人一世自足至死不相借貸信言不美美言不信直露情誠知者不博博者不知不必采訪善者不辨辨者不善不假繁豔聖人不積恣音既盡也以為人己愈勝也有既以與人己愈多天之道利而不害聖人之道為而不爭聖人無積聚聖人為人人為聖人聖人與人人與聖人所以轉多轉有也天道有利而不害聖人有德而不爭也道德真經次解卷下德經異同字第一至第二非乎非故致數輿無輿故致數譽無譽第三至第四勤而行之勤能行大笑之大笑之道若纇道若類若谷若俗第五民之所惡人之所惡王公以為稱王公以為名第六吾是以知是以知第七至第八大盈大滿天下正天下政第九莫大於欲得莫甚於欲得第十至第十二德善得善孩之㤥之第十三投其角駐其角措其爪錯其爪第十四勢成之孰成之第十五至第十六田甚蕪田甚苗第十七至第十八毒蟲毒蟲猛獸不據攫鳥不搏鳥猛獸不搏不道非道曰祥曰詳第十九其紛其忿第二十以政治國以政之國而民自正而人自政第二十一其民淳淳其人蠢蠢禍兮福所倚福兮禍所伏禍福之所倚福禍之所伏其無正邪正復為奇善復為妖其無政政為奇善復為訞第二十二莫若嗇莫若式夫唯嗇夫唯式則無不克則無不充第二十三烹小鮮厚小腥第二十四牝牝牝以靜為下此本無一句取大國聚大國故或下以取或下而取故或下而取或下而聚第二十五不善人之所保不善之所不保何棄之有奚棄之有駟馬四馬以免耶以免第二十六必作於細必作於小第二十七其脆易破其毳易破千里之行始於足下百仞之高起於足下復衆人之所過備衆人之所過第二十八將以愚之將以娛之亦楷式亦為楷式第二十九不爭無爭第三十夭下皆謂我道大似不肖夫唯大故以不肖若肖久矣其細也夫天下皆以我大不笑夫唯大故不笑若笑久其小我有三寶保而持之我有三寶寶而持之以戰則勝以陳則止第三十一至第三十二吾不敢為主吾不敢求為主輕敵侮敵第三十三披褐被褐第三十四夫唯病病是以不病又本無此兩句第三十五民不畏威人不畏威是以聖人故聖人第三十六繟然而善謀不言而善謀第三十七常畏死常不畏死匠斫匠斬第三十八民之飢人之飢以其求生之厚以其生生之厚第三十九生也柔脆其生也柔毳則共則拱第四十以奉有餘奉有餘其不欲見賢斯不貴賢第四十一莫之能勝莫之能先是以聖人又本無此一句第四十二司徹司轍第四十三寡民使有什伯之器寡人有什伯之器無所陳之無所陳之第四十四又本知者不博在善不辨既以與人己愈有既以為人己愈有右不同者七十處德經異同字終

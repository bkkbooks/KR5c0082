body:
  text: 道德真經次解序𠕏七述夫事有萬端義歸一揆鼎分三教理出百家皆體古而存今盡遣邪而歸正莫不明標輪貫互説端倪欲使是者是而非者非白者白而黑者黑其那淳風雖散天道猶同衆聖肩隨羣賢角立孔子有言不順之誚丘明有事不輒之稱轉治轉繁益整益亂所以禮尚大順易貴隨時天既無言人從何欲洎乎造化之內品物之中雖任自然各循本性匹夫所能聖人其有不識匹夫所為聖人其有不解況復玄元妙旨大道精微豈可輕言妄稱得理先者經過遂州見龍興觀石碑上鎸道德二經細而覽之與今本又别字多差錯全無注解亦無篇題事既異同義皆向背舊云為而不恃此云為而恃舊云不尚賢此云不上賢舊云不敢為此云不敢不為舊云跂者不立此云喘者不久舊云田甚蕪此云田甚苗舊云多言此云多聞舊云無私此云無尸舊云不釋此云不汋舊云不克此云不充舊云小鮮此云小腥略敘一十條不可遍舉其於義類自有區分後學前賢各懷所見覩斯遺闕寧無補云不度荒虛隨文解釋分為二卷名曰次解不繼他人之作自成一家之文孰是孰非世多鑒裁聊示同好希毋忽焉謹序

front:
  text: 道德眞經次解卷上
  hash: sha256:4437a1d0d521525436e35cea454d432aaa2b87fd89a6327139f47d03d3aff070
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0082_HFL_001-001a, image: hfl/0386/0386-100.png}
body:
  text: 無名氏著道經此本與舊本雖不同自有義理細而議論别有㫖趣將來君子勿妄移改商較也道可道非常道道之一字分爲三等上道字屬無爲無名之大道中道字是有形可名之道下道字謂常行應用之道名可名非常名亦分爲三等上名字是未有名之名中名字是可呼之名下名字謂常行應用之名無名天地始初也有名萬物母當天地未分時爲無名之始及其清濁既分清爲天濁爲地天覆地載萬物盡在其間如母之養子母猶大道也常無欲觀其妙常有欲觀其徼萬物之在世也聖人觀其要妙本從道生復從道滅徼猶盡也妙猶生也此兩者同出而異名有欲無欲同出於道同謂之玄玄之又玄衆妙之門既有同可謂玄矣其中皆有妙用爲之又玄世間萬物並屬於此妙門而出也天下皆知美之爲美斯惡已萬物從妙門出後故有五色眩目五音聆耳五味爽口爲美矣殊不知五色盲目五音聾耳五味爛腸斯爲惡矣皆知善之爲善斯不善已世人善解施設上至軍國下及黔黎皆能巧立機權日生萬變成功立事應用無窮矣殊不知機權先起於心應變全勞於己功未成而身已殂事未立而名已喪爲不善矣有無相生難易相成長短相形高下相傾音聲相和去聲先後相隨無中生有有中生無有難必有易有長必有短有高必有下有音必有聲有先必有後相生相成形勢傾奪唱和隨逐世之六者苟不相捨下文云聖人以無爲爲治故免於斯是以聖人治處無爲之事行不言之教萬物作興也而不爲始先也爲而恃恃憑於道成功不處夫唯不處是以不去聖人以無爲而治天下不煩言教萬物自然萬物興而不與爭先所行倚恃於道成功立事不處其中若夫不處其功不去不上賢使人不爭不居賢能之上故人不與爭位不貴難得之貨使人不盜不積聚難得之寳貨故人無可盜竊不見可欲使心不亂情欲不起心神不亂聖人治虚其心實其腹弱其志强其骨虚心適道實腹修德弱志順物强骨安身常使無知無欲使夫知者不敢不爲也常使世人盡知無爲無欲知後不敢不爲聖人之治世也爲無爲則無不治若以無爲治世天下無不治也道冲而用之又不盈淵似萬物宗挫其銳解其忿和其光同其塵湛似常存道性冲虚用之又不盈滿根本深邃與萬物同宗聖人禀之天下莫及也所以挫銳如愚解忿守純和光共位同塵渾俗故得湛然常存於世吾不知誰子象帝之先聖人與大道差肩故不爲人子大道在天地前生聖人亦在天地前生故稱象帝之先象帝天地也天地不仁以萬物爲蒭狗蒭草狗畜聖人不仁以百姓爲蒭狗聖人奉天地合道德之生成不以仁蒞物謂百姓與萬物各有自然之性也天地間其猶橐籥橐囊也籥管也虚而不屈動而愈出多聞數窮不如守忠橐籥空虚如天地受氣愈出謂行道也多聞惑正見不如守忠誠谷神不死是謂玄牝玄牝門天地根綿綿若存用之不勤谷養也玄屬鼻主生爲天也牝屬口主死爲地也鼻納清氣口吐濁氣使聯綿不絶恬淡養神外不入内不出即終身無勤勞之事唯聖賢能修世人罕有能行之者天地長久天地所以能長乆者以其不自生故能長久天地體道而生任萬物自生故能長久是以聖人後其身而身先外其身而身存以其無尸士也故能成其尸聖人後身先人外身守道不爲萬物主故萬物賴其爲主也上善若水水善利萬物又不爭處衆人之惡故幾近也於道水性體道形質柔弱臨高就下隨方順圓衆惡皆歸含容一切不與物爭爲萬物利故近道居善地隨地形勢高下心善淵水心空虚如道不實與善仁水性有仁行善利濟萬物言善信應物如響政善治洗濯一切不凈事善能青黄赤白並從所須動善時順時而動不失其宜夫唯不爭故無尤如此不與物爭故無過尤持而盈之不若其已揣度也而銳之不可長寳金玉滿堂莫之能守富貴而驕自遺其咎名成功遂身退天之道執持有爲縱得盈滿不如其止揣度世事得其㑺銳未是身寳堆金積玉得滿堂屋不可長守倚恃富貴但恣驕倨必招殃咎是以聖人成功立事順天道而退之道盈虚晦明不定載營魄抱一道也能無離神曰魂形曰魄身如車乘載其魂魄抱守其一日夕經營使魂魄不離其身專氣致柔能嬰兒專守元氣使其柔弱如嬰兒無有分别滌除玄覽要妙能無疵洗滌要妙使無疵病疵猶病也愛人治國而無知當委大道不俟見知明白四達而無爲通達四方使契無爲天門開闔而爲雌天門者長養之門也常守雌不爲雄生之畜之生而不有爲而不恃長而不宰是謂玄德聖人生長其身畜養其身不有其身不恃其身不宰伐其身可謂玄妙之德也三十輻共一轂當其無有車之用埏埴造器皿具以爲器當其無有器之用鑿户牖以爲室當其無有室之用有之以爲利無之以爲用此說無中生有也假令造車一乘有輪有輻有轂當其未成車之時心中亦有此用也譬如埏埴是造器皿之具當其未成器之時心中亦有此用也又比屋室當其未成門户窗牖之時心中亦有此用也有形之後便成利濟無形已前可爲妙用也五色令人目盲青黄赤白黑若觀外色失其正色是盲五音令人耳聾宫商角徵羽若聽他聲失其正聲是聾五味令人口爽酸苦甜鹹辛若躭其味失其於恬淡馳騁田獵令人心發狂捕逐物命放蕩神情令人顚狂生貪欲心難得之貨令人行妨金銀珍寳好之者妨人正行是以聖人爲腹不爲目故去彼取此爲腹修内爲目修外故去彼修外而取此修内寵辱榮賤若驚貴大患若身何謂寵辱寵爲下失意寵增得之若驚失之若驚寵辱相依得失俱驚是謂寵辱若驚何爲貴大患若身五行相尅四大相侵故爲大患吾所以有大患者爲我有身及吾無身吾有何患不有其身不恃功名故無大患故貴以身於天下者可託天下愛以身於天下者可寄天下寵從辱起患自身生聖人寵至不喜辱來不懼故無大患貴身無辱者可託天下與之愛身無患者可寄夭下與之此是人君寄託天下與聖賢共治也視之不見名曰夷平也聽之不聞名曰希達也博取也之不得名曰微妙也此三者不可致詰問也故混而爲一道也其上不皦明白其下不忽蠅蠅爲不絶義不可名復歸於無物是無狀之狀無物之像是謂忽怳物色也迎之不見其首初也隨之不見其後終也執古之道常行之道以御今之有今時之事能知古始温故是謂道紀大道不可目視耳聽博取窮詰故混一以求之在上位不皦白在下位不疑忽其義不絶復歸於道謂之無物是形狀之狀物色之像忽有忽無乃號忽怳道無初終故迎隨不見但執古來常行之道可御今之有爲能知自古始終是謂道之綱紀也古之善爲士者修道之士微妙玄通深不可識夫唯不可識强爲之容豫若冬涉川有所畏懼猶若畏四鄰儼若容常行敬禮涣若冰將汋泮散混若樸曠若谷谷能廣大沌若濁濫也濁以靜之徐清濫中得理安以動之徐生身安後萬物生保此道者不欲盈若見此道故無盈滿夫唯不欲盈能弊復成古來善修道之人有玄妙深邃之事遁跡藏名世人不識强作容貌以混時俗如冬涉川有所恐懼如居處畏鄰里如客有禮如冰結而散純質如樸曠蕩如谷常如濁濫於濁濫處能清於安靜處能生又不盈滿常處弊闇能守處其道致虚極至大道域守靜篤厚也萬物並作興也吾以觀其復萬物所歸曰復夫物云云各有所生各歸其根歸根曰靜修道至虚極之處乃見萬物或生或滅又見萬物云云盡有根本所歸還歸於靜靜曰復命復命曰常不變易也知常曰明不知常妄作凶認得其道乃知分命謂明見其道也若不知常於分上妄有作爲是凶言越分而行也知常容容能公公能生無私自生生能天有長養恩天能道體道而行道能乆無生無滅没身不殆既知其常能容世上一切好惡曰公至公無私能生萬物如天與道同德知此者終身不見危殆也太上居高太上謂之太上下知知物類情有之故有其道其次親之能順萬物譽之善其所生其次畏之畏有生滅侮之輕侮萬物不得其道信不足有不信其猶貴言成功遂事百姓謂我自然聖人覩萬物紛亂常存信貴言成功立事百姓不知其所由謂是自然之道矣大道廢有仁義智慧出有大僞六親不和有孝慈國家昏亂有忠臣大道之行也無平陂無詐僞無親䟽無忠孝大道之廢也有仁義仁義出於不平有智慧智慧因於爲立言有孝慈孝慈爲無敬恭有忠臣言主失其治道也絶聖棄知人利百倍聖人立法化人智者設計興利有法則有罪有利則有害絶仁棄義人復孝慈仁能濟物義可立事濟有不濟事有不事絶巧棄利盜賊無有巧作機權利美天下賊從姦生盜因利誘此三者言爲文不足故令有所屬言三者不足爲文法故令有所屬別立教令使其各有所屬見素抱撲少私寡欲見素去華也抱撲純質也少私去己也寡欲無憂也使人屬此四者絶學無憂學有所不足絶之守道則無憂唯之與阿相去幾何美之與惡相去何若唯諾不相離美惡不相捨人之所畏不可不畏謂生死二途未見之時不得不畏莽其未央大道無有中央四方衆人熙熙如享大牢如春登臺熙熙和樂也大牢事宴之屬春臺有所觀瞻我魄未兆若嬰兒之未孩魁首也無所歸如嬰兒未有分别歸依也衆人皆有餘我獨若遺衆人有爲常有餘剩聖人虚寂如遺棄物我愚人之心純純純如愚人無所見聞俗人昭昭明也我獨若昏俗人事明聖人守闇俗人察察我獨悶悶俗人孜孜若不及聖人悶悶常無事忽若晦寂無所止如處中夜無所正取衆人皆有以用也我獨頑以鄙衆人舉止皆有作用聖人守樸如頑鄙夫我欲異於人而貴食母衆人有恢殷之心聖人如子求食於母言不自作爲也孔德之容惟道是從大德之人能圓容一切謂從於道也道之爲物唯怳唯惚怳惚中有物怳惚中有像道無形質忽有忽無於有無之間能生物像窈㝠中有精其中有信窈㝠道也有其眞精求之必應不失信也自古及今其名不去以閱覽也終未也甫善也吾何以知終甫之然哉以此從古至今不𢱍此法用閱諸善聖人知諸善自然從此而生也曲則全枉屈也則正窪則盈弊則新少則得多則惑是以聖人抱一爲天下式曲己則事全枉身則表正窪淺則盈溢故弊則自新少求則得多多求則惑亂所以抱一爲法式也不自是故彰不自見故明不自伐故有功不自矜故長不自是則别有能不自見則更見遠不自伐則善立功不自矜則道理長夫唯不爭故莫能與爭古之所謂曲則全豈虚語故成全而歸之曲己從物物莫能爭古行此道豈是虚言事成之後全歸聖人希言自然飄風不終朝驟雨不終日孰爲此天地天地尚不能乆而況於人道本無言常貴自然飄風猛風也不終一朝驟雨暴雨也不終一日天地尚不能用風雨行權世人爭以言教立事故從事而道者道得之同於德者德得之同於失者道失之信不足有不信隨從其道者得其道隨從其德者得其德隨從其失者失其道但存其信物無不信謂不重言也喘者不乆跨者不行自見不明自是不彰自饒無功自矜不長其在道曰餘食綴行物有惡之故有道不處喘謂失道也跨執道也失道者不乆執道者不行也言自見自是自饒自矜之人如有殘喫食如負餟而行其有道者皆惡之有物混成先天地生寂漠獨立不改周行不殆可爲天下母道本虚寂無有伴黨不以晦明改節周行天下而無危殆煦育萬物如母養子吾不知其名字之曰道强爲之名曰大大曰逝往也逝曰遠物不及也遠曰返歸也故道大天大地大王大域中四大而王居其一道生在天地之前行在天地之後求之則不見形用之則有應故强立名爲大大求不得爲逝逝求不得爲遠遠求不得爲返返謂却歸於道道與天地并王皆稱其大而王還守其道人法地地法天天法道道法自然地生萬物故人法之夭養萬物故地法之道生天地故號自然也重爲輕根靜爲躁君輕佻爲枝葉重厚爲根本躁撓爲民安靜爲君是以君子行終日不離輜重謂抱道懷德如有輜重也雖有榮觀臺榭燕處宫室超然如何萬乘之王國君以身輕天下輕則失本道也躁則失君君若不重則失其道躁撓則失其位也善行無轍迹善言無遐適無有蹤迹所在皆到無有言教所在皆行也善計不用籌算世有不策之事籌算不到非道莫知善閉無關楗不可開善結無繩約不可解有關楗繩約者必可開解以其道關結者不可開解是以聖人常善救人而無棄人常善救物而無棄物是謂襲承也明以善救不善人總令歸善聖人不唯救人亦善救物此是承襲昭明之理故善人不善人之師不善人善人之資善人教不善人故稱其師不善人受教行道故有資益於善人不貴其師不愛其資雖智大迷世有不爲人師者是不愛資益也雖有其智是大迷惑也此謂要妙以教人救物爲要妙也知其雄守其雌爲天下蹊常德不離復歸於嬰兒雄强雌弱也守弱如蹊衆流則德不離身使懦弱似嬰兒也知其白守其黑爲天下式法也常德不貸與也復歸於無極知其潔白守其闇昧是法式也又不將潔白貸與人令其同欲自欲歸於至極之理也知其榮守其辱爲天下谷常德乃足復歸於樸榮自辱生榮失歸辱不如守辱辱如谷受天下之惡爲德足合於質樸也樸散爲器聖人用爲官長是以大制無割成器之後便爲樸散有大制者不宰割天下言官長從樸而能理也將欲取天下而爲之吾見其不得已止也天下神器不可爲作也爲故敗之執持也者失之天下萬物有盛衰陵谷有遷變四時如流奇器能神不可止也其有竊神器逆天物强欲爲治者是返道敗德也夫物或行或隨或噓或吹或强或羸或接或隳是以聖人去甚去奢去泰夫物行善則惡隨行惡則善隨冷者要嘘熱者願吹强者恃壯弱者授羸未有可接早有所隳是以去甚惡極也去奢惡華也去泰惡驕也以道佐人主者不以兵强天下其事好還兵用討不庭以道治天下者四海自賔不假用於强兵其事自歸於人主之德還猶歸也師之所處荆棘生興兵之後在處傷殘田園荒廢故生荆棘善者果敢也而已不以取强善爲治者果敢於道故不敢强果而勿無也驕果而勿矜果而勿伐不自恣也不衒己也不恃功也果而不得已是果而勿强物壯則老謂之非道早已果敢於不得已則是其道也不於强壯果敢謂不涉於道言非道者事不可也夫佳善也好也兵者不祥吉也之器物或惡之故有道者不處善好用兵者謂之不吉萬物皆惡是有道不同兵也君子居則貴左用兵則貴右左主治右主權兵者不祥之器非君子之器不得已而用之君子以道爲器失道用兵恬淡爲上故不美恬淡爲無征伐也有戰爭則於國不爲美事若美必樂之是樂殺人夫樂之者則不可得意於天下若美用兵是樂戰爭樂戰爭是樂殺人樂殺人必失天下之人意也吉事軍禮尚左喪禮尚右戎喪偏將軍居左上將軍居右言以喪禮處之殺人衆多以悲哀泣之戰勝以喪禮處之國君居中故有左右左屬陽主治右屬陰主殺偏將佐邦統右將主權變古者以禮樂征伐雖興兵常懷測之心及其勝也哀愁焉謂之䘮禮也道常無名樸雖小天下不敢臣道本無名字樸又微小人有守之者不被天下臣服言不能使有道德之人也王侯若能守萬物將自賔國君富有天下若能守無名之大道萬物盡賔天地相合以降甘露人莫之令而自均天行甘澤在處皆徧非人力所均言道能普也始制有名新造成萬物也名亦既有成器也夫亦將知止萬物休也知止不殆不見危殆譬道在天下猶川谷與江海萬物始因道而生生而復滅不有其生則不危殆如川谷下流往而不返有所歸也知人者智自知者明以智知人不若自知用智損心自知明道勝人者有力自勝者强以力勝人不若自勝自勝者强於勝人知足者富世財無限己身有限苟或知足便是富有强行有志不失其所者乆死而不亡者壽强行上件之事有志於道不失其由可以長乆人死之後魂氣歸於天形魄歸於地道德不亡可謂壽矣大道氾其可左右大道氾溢無有涯際不可立其左右萬物恃以生而不辭功成不名有依被萬物不爲主可名於小萬物歸之不爲主可名於大萬物雖恃大道而生名立功成不知名屬於大道萬物依大道不恃其主故名於小萬物終賴大道爲主故名其大也聖人終不爲大故能成其大聖人體道不有其名故成可大之名執大象大道也天下往往而不害安平泰樂五音也與餌飲饌也過客止不久住也道岀言淡無味視不足見聽不足聞用不可既聖人執大道往天下而治人多安泰安泰之後皆重歡樂飲饌樂極則哀禮煩則亂又以道約之歡樂似遊客所止不乆便過不如守淡靜無味之道即用不可盡也既猶盡也將欲噏之必固張之先以道張之將欲弱之必固强之先以道强之將欲廢之必固興之先以道興也將欲奪之必固與之先以道與之是謂微明此爲返掌之道能用此者事無不從柔弱勝剛强魚不可脱於淵國有利器不可示人柔弱是水剛强是魚魚不可離於水也利器爲柔弱治國可以示人柔弱欲行理道用柔弱爲利器也道常無爲而無不爲王侯若能守萬物將自化化而欲作吾將鎭定也之以無名之樸無名樸亦將無欲無欲以靜天下自正大道本無爲則無所不爲王侯將有爲化萬物萬物被化之後復示以浮樸令人無爲無爲則無欲無欲則安靜王侯以安靜治則夭下自然歸於正道道德眞經次解卷上道經異同字第一至第二故有無相生有無相生萬物作而不辭生而不有爲而不恃萬物作而不爲始而恃夫唯不居夫唯不處第三不尚賢不上賢使夫知者不敢爲也使夫知者不敢不爲也第四或似不盈又不盈解其紛解其忿湛兮似或存湛似常存第五多言數窮多聞數窮守中守忠第六是謂天地根天地根第七天長地久天地長久能長且久能長久故能長生故能長久第八至第九長保長寳功成名遂名成功遂第十句下各有乎字此本並無乎字天門在明白上此本明白在天門上第十一至第十三爲吾有身爲我有身第十四搏之博之繩繩蠅蠅無物之象是謂惚恍無物之像第十五若客若容將釋將汋敦兮其若樸混若樸曠兮其若谷曠若谷渾兮其若濁沌若濁孰能濁以靜之徐清孰能安以久動之徐生濁以靜之徐清安以動之徐生故能弊不新成能弊復成第十六芸芸云云公乃王思乃天公能生生能天第十七猶其貴言其猶貴言第十八至第二十荒兮其未央哉莽其未央太牢大牢我獨怕兮其未兆我魄未兆乘乘兮若無所歸魁無所歸我愚人之心也哉純純兮我愚人之心純純忽若晦寂兮似無所止忽若晦寂無所止我獨異於人我欲異於人求食於母而貴食母第二十一唯恍唯惚惚兮恍其中有象恍兮惚其中有物窈兮㝠其中有精其精甚眞其中有信唯怳唯惚怳惚中有物怳惚有像窈㝠中有精其中有信第二十二枉則直枉則正多則惑多則或不自見故明不自是故彰不自是故彰不自見故明豈虚語哉豈虚語第二十三從事於道者道者同於道德者同於德失者同於失同於道者道亦得之同於德者德亦得之同於失者失亦得之從事而道者道得之同於德者德得之同於失者道失之第二十四跂者不立喘者不乆自伐無功自饒無功餘食贅行餘食綴行第二十五王亦大王大第二十六柰何萬乘之主如何萬乘之主輕則失臣輕則失本第二十七雖知大迷雖智大迷第二十八天下谿天下蹊常德不忒常德不貸第二十九爲者敗之爲故敗之或煦或吹或嘘或吹或載或墮或接或隳第三十荆棘生焉大軍之後必有凶年荆棘生是謂不道不道早已謂之非道非道早已第三十一貴左貴佐恬惔爲上勝而不美而美之者是樂殺人夫樂殺人者不可得志於天下恬惔爲上故不美若美必樂之是樂殺人夫樂之者不可得意於天下凶事尚右喪事尚右偏將軍處左偏將軍居左第三十二侯王王侯第三十三至第三十四大道汎兮大道氾功成不名有愛養萬物而不爲主功成不名有依被萬物不爲主第三十五道之出口淡乎其無味道出言淡無味第三十六至第三十七侯王王侯右不同者六十九處道經異同字終
